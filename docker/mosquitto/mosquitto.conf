# Mosquitto MQTT Broker Configuration for Flower-Basic FL
# ============================================================================
# This configuration allows anonymous connections for local development.
# For production, enable authentication and TLS.
# ============================================================================

# Listener for standard MQTT connections
listener 1883
protocol mqtt

# Listener for WebSocket connections (optional, for browser clients)
listener 9001
protocol websockets

# Allow anonymous connections (for development only)
allow_anonymous true

# Persistence settings
persistence true
persistence_location /mosquitto/data/

# Logging settings
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection settings
connection_messages true

# Max inflight messages per client
max_inflight_messages 20

# Max queued messages per client
max_queued_messages 1000

# Message size limit (default 256MB, can reduce for FL payloads)
message_size_limit 0
