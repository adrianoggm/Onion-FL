# Prometheus Configuration for Flower-Basic
# ============================================================================
# Scrape configuration for collecting metrics from Flower FL components
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'flower-basic-monitor'

# Alerting configuration (optional - uncomment if using Alertmanager)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files (optional - for recording rules and alerts)
# rule_files:
#   - "first_rules.yml"
#   - "second_rules.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OpenTelemetry Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    metrics_path: /metrics

  # Metrics exported by OTEL Collector from Flower components
  - job_name: 'flower-metrics'
    static_configs:
      - targets: ['otel-collector:8889']
    metrics_path: /metrics

  # Optional: Direct scraping of Flower services (if they expose /metrics)
  # Uncomment and adjust if services expose Prometheus metrics directly
  # - job_name: 'flower-server'
  #   static_configs:
  #     - targets: ['server:8080']
  #   metrics_path: /metrics
