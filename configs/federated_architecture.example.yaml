federated_architecture:
  workflow: SWELL  # Flujo principal (SWELL | WESAD | SWEET)

  # El servidor central puede preparar y distribuir las particiones SWELL automáticamente
  dataset:
    name: SWELL
    data_dir: data/SWELL
    modalities: [physiology]
    split:
      train: 0.5
      val: 0.3
      test: 0.2
      seed: 46
      scaler: global
    output_dir: federated_runs/swell
    run_name: example_arch
    ensure_min_train_per_node: true

  orchestrator:
    address: "0.0.0.0:8080"
    rounds: 12
    protocol: "MQTT"
    mqtt:
      broker: "localhost"
      port: 1883
      topics:
        updates: "fl/updates"
        partial: "fl/partial"
        global_model: "fl/global_model"

  model:
    type: "swell_mlp"
    # Dimensión de entrada del modelo SWELL (se obtiene de manifest.meta.n_features)
    input_dim: 178

  # Parámetros globales para clientes (aplican a todos los fogs si no se override)
  client_params:
    lr: 0.001
    local_epochs: 14

  fog_nodes:
    - id: fog_0
      k: 4
      params:
        lr: 0.001
        local_epochs: 14
      clients:
        - id: fog0_c1
          dataset: "SWELL"
          rounds: 12
          data_dir: "federated_runs/swell/example_manual/fog_0"
        - id: fog0_c2
          dataset: "SWELL"
          rounds: 12
          data_dir: "federated_runs/swell/example_manual/fog_0"

    - id: fog_1
      k: 4
      params:
        lr: 0.001
        local_epochs: 14
      clients:
        - id: fog1_c1
          dataset: "SWELL"
          rounds: 12
          data_dir: "federated_runs/swell/example_manual/fog_1"
        - id: fog1_c2
          dataset: "SWELL"
          rounds: 12
          data_dir: "federated_runs/swell/example_manual/fog_1"

    - id: fog_2
      k: 4
      params:
        lr: 0.001
        local_epochs: 14
      clients:
        - id: fog2_c1
          dataset: "SWELL"
          rounds: 12
          data_dir: "federated_runs/swell/example_manual/fog_2"
        - id: fog2_c2
          dataset: "SWELL"
          rounds: 12
          data_dir: "federated_runs/swell/example_manual/fog_2"
